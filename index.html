<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Baloo+2:wght@600;700&family=Shadows+Into+Light&family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   CRAYON SCRAPBOOK BIRTHDAY SITE — v2 (bold rainbow / maximalist)
   ------------------------------------------------------------
   HOW TO CUSTOMIZE (search these markers):
   [EDIT: NAME]      -> friend's name
   [EDIT: AUDIO]     -> your song file/link in the <audio> tag
   [EDIT: MESSAGES]  -> the three carousel messages (in <script> CONFIG)
   [EDIT: PHOTOS]    -> replace collage placeholders with real <img> tags
   ============================================================ */

:root{
  --pink:   #FF3D81;
  --yellow: #FFD400;
  --sky:    #00B4D8;
  --green:  #4CD964;
  --orange: #FF7A00;
  --purple: #9B5DE5;
  --ink:    #2B1B34;
  --cream:  #FFF8EC;
  --tint-hero:     #FFF8EC;
  --tint-cake:     #E9F9FF;
  --tint-carousel: #FFF0F7;
  --bounce: cubic-bezier(.68,-0.6,.27,1.65);
  --bounce-soft: cubic-bezier(.34,1.56,.64,1);
}

*{ box-sizing:border-box; }
html{ scroll-behavior:smooth; }

body{
  margin:0;
  color:var(--ink);
  font-family:'Fraunces', serif;
  font-size:19px;
  overflow-x:hidden;
  background:var(--tint-hero);
}

h1,h2,h3,.marker{ font-family:'Fraunces', serif; font-weight:600; letter-spacing:0.3px; }
.script{ font-family:'Shadows Into Light', cursive; font-weight:400; font-size:1.05em; }

@media (prefers-reduced-motion: reduce){
  *{ animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important; }
}

::selection{ background:var(--yellow); color:var(--ink); }
a, button{ font-family:inherit; }
:focus-visible{ outline:3px solid var(--sky); outline-offset:3px; border-radius:6px; }

.section-paper{ position:relative; }
.section-paper.hero{ background:var(--tint-hero); }
.section-paper.cake{ background:var(--tint-cake); }
.section-paper.carousel{ background:var(--tint-carousel); }

/* soft color wash + paper grain, on every section */
.section-paper::before{
  content:''; position:absolute; inset:-2%; pointer-events:none; z-index:-1;
  background-image:
    radial-gradient(circle at 12% 18%, rgba(255,61,129,0.16), transparent 34%),
    radial-gradient(circle at 88% 12%, rgba(0,180,216,0.16), transparent 34%),
    radial-gradient(circle at 82% 82%, rgba(255,212,0,0.18), transparent 34%),
    radial-gradient(circle at 15% 85%, rgba(76,217,100,0.15), transparent 34%),
    radial-gradient(circle at 50% 50%, rgba(155,93,229,0.10), transparent 45%),
    radial-gradient(rgba(43,27,52,0.07) 1px, transparent 1.5px);
  background-size: auto, auto, auto, auto, auto, 16px 16px;
  animation: wash-drift 22s ease-in-out infinite;
}
/* scattered confetti dots, on every section */
.section-paper::after{
  content:''; position:absolute; inset:-2%; pointer-events:none; z-index:-1;
  background-image:
    radial-gradient(circle, var(--pink) 3.5px, transparent 4px),
    radial-gradient(circle, var(--sky) 3.5px, transparent 4px),
    radial-gradient(circle, var(--yellow) 3.5px, transparent 4px),
    radial-gradient(circle, var(--green) 3.5px, transparent 4px),
    radial-gradient(circle, var(--purple) 3.5px, transparent 4px);
  background-size: 140px 140px, 160px 160px, 130px 130px, 170px 170px, 150px 150px;
  background-position: 10px 20px, 70px 90px, 40px 130px, 110px 30px, 130px 110px;
  opacity:0.22;
  animation: wash-drift 30s ease-in-out infinite reverse;
}
@keyframes wash-drift{
  0%,100%{ transform:translate(0,0) scale(1); }
  50%{ transform:translate(-1.5%, 1.5%) scale(1.025); }
}

/* ---------- reusable crayon panel ---------- */
.crayon-card{
  background:#fff;
  border:4px solid var(--ink);
  border-radius: 22px 30px 24px 32px / 30px 22px 32px 24px;
  box-shadow: 6px 6px 0 var(--ink), 11px 11px 0 var(--yellow);
  position:relative;
}

/* washi tape */
.washi{
  position:absolute; width:76px; height:28px;
  box-shadow:0 2px 5px rgba(0,0,0,0.2);
  opacity:0.92; z-index:5;
}
.washi.pink{ background:repeating-linear-gradient(45deg, var(--pink), var(--pink) 7px, #ffffffb0 7px, #ffffffb0 14px); }
.washi.sky{ background:repeating-linear-gradient(45deg, var(--sky), var(--sky) 7px, #ffffffb0 7px, #ffffffb0 14px); }
.washi.yellow{ background:repeating-linear-gradient(-45deg, var(--yellow), var(--yellow) 7px, #ffffffb0 7px, #ffffffb0 14px); }
.washi.green{ background:repeating-linear-gradient(-45deg, var(--green), var(--green) 7px, #ffffffb0 7px, #ffffffb0 14px); }

/* ---------- scalloped sticker badge ---------- */
.badge{
  width:118px; height:118px; border-radius:50%;
  border:4px solid var(--ink);
  box-shadow:4px 4px 0 var(--ink);
  display:flex; align-items:center; justify-content:center; text-align:center;
  font-family:'Baloo 2', sans-serif; font-weight:700; font-size:0.85rem; line-height:1.15; color:var(--ink); letter-spacing:0.3px;
  position:relative; z-index:6;
  animation: wiggle 3.4s ease-in-out infinite;
}
.badge::before{
  content:''; position:absolute; inset:7px; border-radius:50%;
  border:2px dashed var(--ink); opacity:0.55;
}
.badge span{ position:relative; z-index:2; padding:0 8px; }
.badge .badge-icon{ position:relative; z-index:2; flex-shrink:0; }
@keyframes wiggle{ 0%,100%{ transform:rotate(-8deg);} 50%{ transform:rotate(4deg);} }

/* ---------- ambient floating motes (background life) ---------- */
.mote{
  position:absolute; border-radius:50%; pointer-events:none; z-index:0;
  animation: mote-float 7s ease-in-out infinite;
}
@keyframes mote-float{
  0%{ transform:translateY(0) scale(1); opacity:0.25; }
  50%{ transform:translateY(-40px) scale(1.3); opacity:0.55; }
  100%{ transform:translateY(-80px) scale(0.9); opacity:0; }
}
.doodle{ position:absolute; z-index:1; pointer-events:none; animation: float-bob 4.5s ease-in-out infinite; }
.doodle.spin{ animation: float-bob 4.5s ease-in-out infinite, spin-slow 9s linear infinite; }
@keyframes float-bob{ 0%,100%{ transform:translateY(0) rotate(var(--r,0deg)); } 50%{ transform:translateY(-14px) rotate(var(--r,0deg)); } }
@keyframes spin-slow{ to{ transform:rotate(360deg); } }

/* ---------- torn paper divider ---------- */
.torn{ display:block; width:100%; position:relative; z-index:2; margin-top:-2px; }
.torn svg{ display:block; width:100%; height:56px; }

/* ---------- top floating controls ---------- */
#audio-toggle, #reset-toggle{
  position:fixed; top:16px; z-index:80;
  width:58px; height:58px; border-radius:50%;
  border:4px solid var(--ink); cursor:pointer;
  box-shadow:3px 4px 0 var(--ink);
  font-size:22px; display:flex; align-items:center; justify-content:center;
  transition: transform 0.3s var(--bounce-soft);
}
#audio-toggle{ right:16px; background:var(--pink); }
#reset-toggle{ left:16px; background:var(--green); }
#audio-toggle:hover, #reset-toggle:hover{ transform:scale(1.12) rotate(-8deg); }
#audio-toggle:active, #reset-toggle:active{ transform:scale(0.92); }

/* =========================================================
   HERO
========================================================= */
.hero{
  min-height:100vh;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:70px 16px 60px; text-align:center;
}

.hero-badge{ position:absolute; top:8%; left:6%; background:var(--yellow); transform:rotate(-10deg); }
@media (max-width:700px){ .hero-badge{ display:none; } }

.bunting{ position:absolute; top:0; left:0; width:100%; height:60px; z-index:2; }

.reveal-stage{
  position:relative; z-index:3;
  width:min(90vw, 480px); height:min(90vw, 480px);
  display:flex; align-items:center; justify-content:center;
}
.reveal-stage.tappable{ cursor:pointer; }
.reveal-stage.tappable .bouquet-wrap{ animation: tap-pulse 2.2s ease-in-out infinite; }
@keyframes tap-pulse{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.03); } }
.tap-hint{
  position:absolute; left:50%; top:104%;
  font-family:'Shadows Into Light', cursive; font-size:1.2rem; color:var(--ink);
  opacity:0.85; white-space:nowrap; pointer-events:none; text-align:center;
  animation: tap-hint-bob 1.8s ease-in-out infinite;
  transition: opacity 0.5s ease;
}
@keyframes tap-hint-bob{
  0%,100%{ transform:translate(-50%, 0); }
  50%{ transform:translate(-50%, 8px); }
}
.reveal-stage.revealed .tap-hint{ opacity:0; }
.reveal-glow{
  position:absolute; width:135%; height:135%; left:50%; top:50%;
  transform:translate(-50%,-50%); border-radius:50%; z-index:0;
  background: radial-gradient(circle, rgba(255,212,0,0.35), rgba(255,111,168,0.22) 40%, transparent 72%);
  filter:blur(26px);
  animation: glow-pulse 5s ease-in-out infinite;
}
@keyframes glow-pulse{
  0%,100%{ opacity:0.55; transform:translate(-50%,-50%) scale(1); }
  50%{ opacity:0.85; transform:translate(-50%,-50%) scale(1.08); }
}

.baby-wrap{
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  transform:scale(0.6) rotate(-6deg); opacity:0;
  transition: transform 1.4s var(--bounce-soft) 1s, opacity 1.3s ease 1s;
}
.reveal-stage.revealed .baby-wrap{ transform:scale(1) rotate(0deg); opacity:1; }
.baby-svg{ width:52%; height:52%; filter:url(#crayon-rough); }

.bouquet-wrap{ position:absolute; inset:0; z-index:5; }
.bouquet-half, .bouquet-ribbon{
  position:absolute; left:50%; top:50%; width:92%; height:92%;
  transform:translate(-50%,-50%);
  transition: transform 2.3s cubic-bezier(.6,0.04,.32,1), opacity 1.7s ease;
  filter:url(#crayon-rough);
}
.bouquet-wrap.open .bouquet-left{
  transform: translate(calc(-50% - 70%), calc(-50% - 8%)) rotate(-30deg) scale(0.7);
  opacity:0;
}
.bouquet-wrap.open .bouquet-right{
  transform: translate(calc(-50% + 70%), calc(-50% - 8%)) rotate(30deg) scale(0.7);
  opacity:0;
}
.bouquet-wrap.open .bouquet-ribbon{
  transform: translate(-50%, calc(-50% + 18%)) scale(0.55);
  opacity:0;
  transition: transform 1.3s var(--bounce-soft), opacity 1s ease;
}

.hero-title{
  margin:30px 0 0; display:flex; flex-wrap:wrap; justify-content:center; gap:0 2px;
  font-family:'Bangers', cursive; font-size:clamp(2.6rem, 9vw, 5rem); line-height:1;
}
.hero-title .letter{
  display:inline-block; -webkit-text-stroke:2px var(--ink); color:var(--letter-color, var(--pink));
  text-shadow:3px 3px 0 var(--ink);
  transform: translateY(40px) rotate(var(--r,0deg)) scale(0.4); opacity:0;
  transition: transform 0.7s var(--bounce), opacity 0.5s ease;
  transition-delay: var(--d, 0s);
}
.hero-title .letter.show{
  transform: translateY(0) rotate(var(--r,0deg)) scale(1); opacity:1;
  animation: letter-shake 2.6s ease-in-out infinite;
  animation-delay: calc(var(--d, 0s) + 1.3s);
}
@keyframes letter-shake{
  0%, 100%{ transform: translateY(0) rotate(var(--r,0deg)) scale(1); }
  20%{ transform: translateY(-3px) rotate(calc(var(--r,0deg) + 4deg)) scale(1.03); }
  40%{ transform: translateY(2px) rotate(calc(var(--r,0deg) - 5deg)) scale(0.98); }
  60%{ transform: translateY(-2px) rotate(calc(var(--r,0deg) + 3deg)) scale(1.02); }
  80%{ transform: translateY(2px) rotate(calc(var(--r,0deg) - 3deg)) scale(1); }
}
.hero-title .space{ width:0.35em; display:inline-block; }

.hero-sub{
  margin-top:14px; font-size:1.5rem; color:var(--ink);
  opacity:0; transform:translateY(14px); transition:all 0.8s ease 0.2s;
}
.hero-sub.show{ opacity:1; transform:translateY(0); }

.scroll-cue{
  margin-top:46px; font-family:'Shadows Into Light', cursive; font-size:1.4rem;
  animation: bob 1.8s ease-in-out infinite; opacity:0.9;
}
@keyframes bob{ 0%,100%{ transform:translateY(0);} 50%{ transform:translateY(8px);} }

/* confetti */
.confetti-piece{ position:fixed; top:-20px; z-index:90; pointer-events:none; animation-timing-function:linear; animation-fill-mode:forwards; }
@keyframes confetti-fall{
  0%{ transform:translate(0,0) rotate(0deg); }
  30%{ transform:translate(30px, 30vh) rotate(200deg); }
  60%{ transform:translate(-25px, 65vh) rotate(430deg); }
  100%{ transform:translate(15px, 105vh) rotate(700deg); opacity:0.3; }
}

/* =========================================================
   CAKE SECTION
========================================================= */
.cake-section{
  min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:70px 16px; text-align:center;
}
.cake-heading{ color:var(--orange); text-shadow:2px 2px 0 var(--ink), 4px 4px 0 var(--yellow); margin-bottom:34px; font-size:clamp(2rem,6vw,3rem); }

.cake-stage{
  position:relative;
  opacity:0; transform:translateY(70px) rotate(-6deg) scale(0.8);
  transition: all 1.1s var(--bounce);
}
.cake-stage.in-view{ opacity:1; transform:translateY(0) rotate(0) scale(1); }

.cake-wish-badge{ position:absolute; top:-20px; right:-6%; background:var(--pink); color:#fff; transform:rotate(10deg); z-index:8; }
@media (max-width:600px){ .cake-wish-badge{ right:-2%; width:96px; height:96px; font-size:0.72rem; } }

.cake-btn{ width:min(72vw, 360px); cursor:pointer; background:none; border:none; padding:0; display:block; margin:0 auto; }
.cake-svg{ width:100%; height:auto; filter:url(#crayon-rough); }

.flame{ transform-origin:center bottom; transition: opacity 0.4s ease, transform 0.4s ease; animation: flicker 0.6s ease-in-out infinite alternate; }
@keyframes flicker{ from{ transform:scale(1) rotate(-3deg);} to{ transform:scale(1.12) rotate(3deg);} }
.blown .flame{ opacity:0; transform:scale(0.2) translateY(6px); animation:none; }

.smoke-puff{ position:absolute; border-radius:50%; background:rgba(140,140,150,0.55); pointer-events:none; animation: smoke-rise 1.4s ease-out forwards; z-index:70; }
@keyframes smoke-rise{ 0%{ opacity:0.65; transform:translateY(0) scale(0.6);} 100%{ opacity:0; transform:translateY(-70px) scale(1.8);} }

.cake-caption{ margin-top:26px; font-family:'Shadows Into Light', cursive; font-size:2.1rem; color:var(--purple); }
.cake-caption .after{ display:none; }
.blown-wrap .cake-caption .before{ display:none; }
.blown-wrap .cake-caption .after{ display:inline; }

/* =========================================================
   CAROUSEL SECTION
========================================================= */
.carousel-section{ min-height:100vh; width:100%; padding:70px 16px 100px; display:flex; flex-direction:column; align-items:center; text-align:center; }
.carousel-heading{ width:100%; font-size:clamp(2rem,5.5vw,2.8rem); color:var(--sky); text-shadow:2px 2px 0 var(--ink), 4px 4px 0 var(--pink); margin:0 0 36px; text-align:center; }

.carousel{ position:relative; width:min(92vw, 640px); max-width:640px; margin:0 auto; z-index:3; }
.carousel-track{ overflow:hidden; border-radius:26px; width:100%; }
.carousel-slides{ display:flex; width:100%; transition: transform 0.6s var(--bounce); }
.slide{ min-width:100%; min-height:480px; box-sizing:border-box; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; padding:40px 24px; text-align:center; margin:0 auto; }
.slide-illustration{ width:min(62vw, 270px); max-width:100%; margin:0 auto; filter:url(#crayon-rough); overflow:visible; }
.slide-message{ width:100%; font-size:1.3rem; max-width:46ch; margin:0 auto; text-align:center; }

.carousel-nav{
  position:absolute; top:50%; transform:translateY(-50%);
  width:52px; height:52px; border-radius:50%;
  background:var(--yellow); border:4px solid var(--ink);
  box-shadow:3px 4px 0 var(--ink); font-size:22px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition: transform 0.25s var(--bounce-soft);
}
.carousel-nav:hover{ background:var(--orange); transform:translateY(-50%) scale(1.1); }
.carousel-nav.prev{ left:-16px; } .carousel-nav.next{ right:-16px; }
@media (max-width:560px){ .carousel-nav.prev{ left:-8px; } .carousel-nav.next{ right:-8px; } }

.carousel-dots{ display:flex; gap:12px; justify-content:center; margin-top:22px; }
.dot{ width:16px; height:16px; border-radius:50%; background:#fff; border:2.5px solid var(--ink); cursor:pointer; transition:transform 0.2s var(--bounce-soft); }
.dot.active{ background:var(--pink); transform:scale(1.25); }

.corner-star{ position:absolute; width:34px; z-index:8; animation:wiggle 2.6s ease-in-out infinite; }

/* --- superhero slide --- */
.superhero-slide .slide-illustration{ animation: hero-fly 4.2s ease-in-out infinite alternate; }
@keyframes hero-fly{
  0%{   transform: translate(-16%, 8%)  rotate(-9deg); }
  50%{  transform: translate(0%, -6%)   rotate(2deg); }
  100%{ transform: translate(16%, 8%)   rotate(9deg); }
}
.hero-cape{ transform-origin: 70px 60px; animation: cape-flap 0.9s ease-in-out infinite; }
@keyframes cape-flap{ 0%,100%{ transform:skewX(0deg) rotate(0deg);} 50%{ transform:skewX(18deg) rotate(8deg);} }
.hero-star{ animation: twinkle 1.3s ease-in-out infinite; transform-origin:center; }
.hero-star:nth-child(2){ animation-delay:0.3s; } .hero-star:nth-child(3){ animation-delay:0.6s; }
@keyframes twinkle{ 0%,100%{ transform:scale(0.6); opacity:0.5;} 50%{ transform:scale(1.3); opacity:1;} }

/* --- two heads slide --- */
.pop-heart{ animation: heart-pop 1.7s ease-in-out infinite; transform-origin:center; }
.pop-heart:nth-child(2){ animation-delay:0.35s; } .pop-heart:nth-child(3){ animation-delay:0.7s; } .pop-heart:nth-child(4){ animation-delay:1.05s; }
@keyframes heart-pop{
  0%{ transform:translateY(10px) scale(0.3) rotate(-8deg); opacity:0; }
  30%{ opacity:1; }
  70%{ transform:translateY(-42px) scale(1.15) rotate(8deg); opacity:1; }
  100%{ transform:translateY(-58px) scale(0.9) rotate(0deg); opacity:0; }
}

/* --- collage slide --- */
.collage-grid{ display:grid; grid-template-columns:repeat(3, 1fr); gap:12px; width:100%; max-width:420px; margin:0 auto; }
.collage-slot{
  aspect-ratio:1/1; background:var(--cream); border:3px solid var(--ink); border-radius:8px;
  display:flex; align-items:center; justify-content:center; font-size:0.9rem; color:#9a8aa0;
  overflow:hidden; transform:rotate(var(--r,0deg)); box-shadow:3px 4px 0 var(--ink); position:relative;
}
.collage-slot:nth-child(1){ --r:-5deg; } .collage-slot:nth-child(2){ --r:4deg; } .collage-slot:nth-child(3){ --r:-3deg; }
.collage-slot:nth-child(4){ --r:3deg; } .collage-slot:nth-child(5){ --r:-4deg; } .collage-slot:nth-child(6){ --r:5deg; }
.collage-slot img{ width:100%; height:100%; object-fit:cover; }

.collage-upload{
  margin-top:6px; font-family:'Shadows Into Light', cursive; font-size:1.25rem;
  background:var(--green); border:3px solid var(--ink); padding:9px 22px; border-radius:30px; cursor:pointer;
  box-shadow:3px 3px 0 var(--ink); transition:transform 0.2s var(--bounce-soft);
}
.collage-upload:hover{ transform:scale(1.06) rotate(-2deg); }

footer{ text-align:center; padding:34px 16px 54px; font-family:'Shadows Into Light', cursive; font-size:1.3rem; color:#8a7f8a; background:var(--tint-carousel); position:relative; z-index:2; }
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute">
  <defs>
    <filter id="crayon-rough" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.02" numOctaves="2" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="5"/>
    </filter>
    <symbol id="doodle-star" viewBox="0 0 40 40"><path d="M20 2 L24 15 L38 15 L27 23 L31 37 L20 28 L9 37 L13 23 L2 15 L16 15 Z" fill="currentColor" stroke="var(--ink)" stroke-width="1.5"/></symbol>
    <symbol id="doodle-swirl" viewBox="0 0 40 40"><path d="M5 22 Q3 6 20 6 Q36 6 35 20 Q34 30 24 29 Q17 28 18 21" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round"/></symbol>
    <symbol id="doodle-heart" viewBox="0 0 40 40"><path d="M20 34 C2 22 2 8 14 8 C18 8 20 11 20 11 C20 11 22 8 26 8 C38 8 38 22 20 34Z" fill="currentColor" stroke="var(--ink)" stroke-width="1.5"/></symbol>
    <symbol id="doodle-bolt" viewBox="0 0 40 40"><path d="M22 2 L8 22 L18 22 L14 38 L34 16 L22 16 Z" fill="currentColor" stroke="var(--ink)" stroke-width="1.5"/></symbol>

          <svg class="slide-illustration" viewBox="0 0 220 160">
            <circle cx="55" cy="90" r="42" fill="#FFDFB8" stroke="#2B1B34" stroke-width="3"/>
            <path d="M18 82 Q55 30 92 82 Q90 60 55 55 Q20 60 18 82" fill="#5A3A22" stroke="#2B1B34" stroke-width="2"/>
            <circle cx="42" cy="92" r="4" fill="#2B1B34"/><circle cx="66" cy="92" r="4" fill="#2B1B34"/>
            <path d="M42 108 Q55 116 66 108" fill="none" stroke="#2B1B34" stroke-width="3" stroke-linecap="round"/>

            <circle cx="165" cy="90" r="42" fill="#FFE3CF" stroke="#2B1B34" stroke-width="3"/>
            <path d="M126 78 Q165 32 204 78 Q206 90 198 96 Q198 60 165 58 Q132 60 132 96 Q124 90 126 78" fill="#7A4A2B" stroke="#2B1B34" stroke-width="2"/>
            <circle cx="150" cy="60" r="7" fill="var(--pink)" stroke="#2B1B34" stroke-width="1.5"/><circle cx="180" cy="60" r="7" fill="var(--pink)" stroke="#2B1B34" stroke-width="1.5"/>
            <circle cx="152" cy="92" r="4" fill="#2B1B34"/><circle cx="176" cy="92" r="4" fill="#2B1B34"/>
            <path d="M152 108 Q165 116 176 108" fill="none" stroke="#2B1B34" stroke-width="3" stroke-linecap="round"/>

            <path class="pop-heart" d="M110 70 c-8 -14 -30 -6 -18 12 c6 9 18 15 18 15 c0 0 12 -6 18 -15 c12 -18 -10 -26 -18 -12z" fill="var(--pink)" stroke="#2B1B34" stroke-width="2"/>
            <path class="pop-heart" d="M108 55 c-6 -10 -22 -4 -13 9 c4 7 13 11 13 11 c0 0 9 -4 13 -11 c9 -13 -7 -19 -13 -9z" fill="var(--orange)" stroke="#2B1B34" stroke-width="2"/>
            <path class="pop-heart" d="M112 90 c-6 -10 -22 -4 -13 9 c4 7 13 11 13 11 c0 0 9 -4 13 -11 c9 -13 -7 -19 -13 -9z" fill="var(--purple)" stroke="#2B1B34" stroke-width="2"/>
          </svg>
          <p class="slide-message script" data-msg-slot="1"><!-- [EDIT: MESSAGES] --></p>
        </div>

        <!-- SLIDE 3: photo collage -->
        <div class="slide crayon-card">
          <div class="washi sky" style="top:-14px; left:20px; transform:rotate(-6deg);"></div>
          <div class="washi pink" style="top:-14px; right:20px; transform:rotate(5deg);"></div>
          <p class="slide-message script" data-msg-slot="2"><!-- [EDIT: MESSAGES] --></p>
          <div class="collage-grid" id="collage-grid">
            <!-- [EDIT: PHOTOS] Replace slot contents with: <img src="your-photo.jpg" alt=""> -->
            <div class="collage-slot">photo</div>
            <div class="collage-slot">photo</div>
            <div class="collage-slot">photo</div>
            <div class="collage-slot">photo</div>
            <div class="collage-slot">photo</div>
            <div class="collage-slot">photo</div>
          </div>
          <label class="collage-upload">
            add photos
            <svg width="18" height="18" viewBox="0 0 24 24" style="vertical-align:-3px"><rect x="3" y="7" width="18" height="13" rx="2" fill="none" stroke="var(--ink)" stroke-width="2"/><circle cx="12" cy="13.5" r="3.4" fill="none" stroke="var(--ink)" stroke-width="2"/><rect x="8" y="4" width="8" height="3" rx="1" fill="var(--ink)"/></svg>
            <input type="file" id="collage-input" accept="image/*" multiple style="display:none">
          </label>
        </div>

      </div>
    </div>

    <button class="carousel-nav prev" id="carousel-prev" aria-label="Previous message">‹</button>
    <button class="carousel-nav next" id="carousel-next" aria-label="Next message">›</button>
  </div>

  <div class="carousel-dots" id="carousel-dots"></div>
</section>

<footer>made with <svg width="16" height="16" viewBox="0 0 24 24" style="vertical-align:-3px"><rect x="4" y="9" width="14" height="6" rx="1.5" transform="rotate(-15 11 12)" fill="var(--pink)" stroke="var(--ink)" stroke-width="1.5"/><path d="M18 9 L21 12 L18 15 Z" transform="rotate(-15 18 12)" fill="#FFDFB8" stroke="var(--ink)" stroke-width="1.5"/></svg> &amp; love, just for you</footer>

<script>
const CONFIG = {
  // [EDIT: MESSAGES] one message per carousel slide
  messages: [
    "To the guy who's basically a superhero in disguise — thanks for always showing up when it matters. Happy birthday!",
    "Best friends since forever, and I wouldn't trade a single memory. Here's to more of them. Happy birthday!",
    "A little collage of us, because some memories deserve to be stuck on paper (and screens). Happy birthday!"
  ]
};
document.querySelectorAll('[data-msg-slot]').forEach(el=>{
  el.textContent = CONFIG.messages[Number(el.dataset.msgSlot)] || '';
});

/* ---------- build rainbow sticker letters ---------- */
const titleEl = document.getElementById('hero-title');
const palette = ['var(--pink)','var(--orange)','var(--sky)','var(--green)','var(--purple)','var(--yellow)'];
const rotations = [-7,5,-4,8,-6,4,7,-5,6,-3,5,-8];
const text = titleEl.dataset.text;
[...text].forEach((ch,i)=>{
  const span = document.createElement('span');
  if(ch === ' '){ span.className='space'; titleEl.appendChild(span); return; }
  span.className = 'letter';
  span.textContent = ch;
  span.style.setProperty('--letter-color', palette[i % palette.length]);
  span.style.setProperty('--r', rotations[i % rotations.length]+'deg');
  span.style.setProperty('--d', (i*0.045)+'s');
  titleEl.appendChild(span);
});
const letters = titleEl.querySelectorAll('.letter');
const heroSub = document.getElementById('hero-sub');

/* ---------- confetti ---------- */
function spawnConfetti(count=70){
  const colors = ['#FF3D81','#FFD400','#00B4D8','#4CD964','#FF7A00','#9B5DE5'];
  for(let i=0;i<count;i++){
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    const size = 7 + Math.random()*8;
    const shape = Math.random() > 0.5 ? '50%' : '2px';
    el.style.width = size+'px';
    el.style.height = (size*0.5 + Math.random()*size*0.5)+'px';
    el.style.borderRadius = shape;
    el.style.left = Math.random()*100+'vw';
    el.style.background = colors[Math.floor(Math.random()*colors.length)];
    el.style.animationName = 'confetti-fall';
    el.style.animationDuration = (2.4 + Math.random()*1.8)+'s';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 4400);
  }
}

/* ---------- hero reveal ---------- */
const stage = document.getElementById('reveal-stage');
const curtain = document.getElementById('flower-curtain');
let revealed = false;

function playHero(){
  curtain.classList.add('open');
  stage.classList.add('revealed');
  stage.classList.remove('tappable');
  letters.forEach(l=>l.classList.add('show'));
  heroSub.classList.add('show');
  setTimeout(()=>spawnConfetti(70), 500);
}
function resetHero(){
  curtain.classList.remove('open');
  stage.classList.remove('revealed');
  letters.forEach(l=>l.classList.remove('show'));
  heroSub.classList.remove('show');
  revealed = false;
  stage.classList.add('tappable');
}
stage.classList.add('tappable');
stage.addEventListener('click', ()=>{
  if(revealed) return;
  revealed = true;
  playHero();
});

/* ---------- audio toggle ---------- */
const bgm = document.getElementById('bgm');
const audioBtn = document.getElementById('audio-toggle');
const audioIcon = document.getElementById('audio-icon');
const NOTE_ICON = '<path d="M9 17V5l10-2v12" stroke="var(--ink)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/><circle cx="6" cy="17" r="3" fill="var(--ink)"/><circle cx="16" cy="15" r="3" fill="var(--ink)"/>';
const PAUSE_ICON = '<rect x="6" y="4" width="4" height="16" rx="1.5" fill="var(--ink)"/><rect x="14" y="4" width="4" height="16" rx="1.5" fill="var(--ink)"/>';
let playing = false;
audioBtn.addEventListener('click', ()=>{
  if(!playing){ bgm.play().catch(()=>{}); audioIcon.innerHTML = PAUSE_ICON; }
  else { bgm.pause(); audioIcon.innerHTML = NOTE_ICON; }
  playing = !playing;
});

/* ---------- cake reveal on scroll ---------- */
const cakeStage = document.getElementById('cake-stage');
const io = new IntersectionObserver((entries)=>{
  entries.forEach(entry=>{ if(entry.isIntersecting) cakeStage.classList.add('in-view'); });
}, { threshold:0.35 });
io.observe(cakeStage);

/* ---------- blow out candles ---------- */
const cakeBtn = document.getElementById('cake-btn');
const cakeSvg = document.getElementById('cake-svg');
let blown = false;
function blowCandles(){
  if(blown) return;
  blown = true;
  cakeSvg.classList.add('blown');
  cakeStage.classList.add('blown-wrap');
  const rect = cakeBtn.getBoundingClientRect();
  [0,1,2].forEach((i)=>{
    setTimeout(()=>{
      const puff = document.createElement('div');
      puff.className = 'smoke-puff';
      const size = 15 + Math.random()*11;
      puff.style.width = size+'px'; puff.style.height = size+'px';
      puff.style.left = (rect.left + rect.width*(0.35+i*0.15))+'px';
      puff.style.top = (rect.top + rect.height*0.18)+'px';
      document.body.appendChild(puff);
      setTimeout(()=>puff.remove(), 1500);
    }, i*120);
  });
  spawnConfetti(50);
}
function resetCake(){
  blown = false;
  cakeSvg.classList.remove('blown');
  cakeStage.classList.remove('blown-wrap');
}
cakeBtn.addEventListener('click', blowCandles);

/* ---------- carousel ---------- */
const slidesEl = document.getElementById('carousel-slides');
const slides = slidesEl.children;
const dotsWrap = document.getElementById('carousel-dots');
let current = 0;
for(let i=0;i<slides.length;i++){
  const dot = document.createElement('button');
  dot.className = 'dot' + (i===0?' active':'');
  dot.setAttribute('aria-label', 'Go to message '+(i+1));
  dot.addEventListener('click', ()=>goTo(i));
  dotsWrap.appendChild(dot);
}
const dots = dotsWrap.children;
function goTo(i){
  current = (i + slides.length) % slides.length;
  slidesEl.style.transform = `translateX(-${current*100}%)`;
  for(let d=0; d<dots.length; d++) dots[d].classList.toggle('active', d===current);
}
document.getElementById('carousel-prev').addEventListener('click', ()=>goTo(current-1));
document.getElementById('carousel-next').addEventListener('click', ()=>goTo(current+1));
document.querySelector('.carousel').addEventListener('keydown', (e)=>{
  if(e.key === 'ArrowLeft') goTo(current-1);
  if(e.key === 'ArrowRight') goTo(current+1);
});
let touchStartX = null;
const track = document.querySelector('.carousel-track');
track.addEventListener('touchstart', e=> touchStartX = e.touches[0].clientX, {passive:true});
track.addEventListener('touchend', e=>{
  if(touchStartX===null) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  if(Math.abs(dx) > 40) goTo(current + (dx < 0 ? 1 : -1));
  touchStartX = null;
}, {passive:true});

/* ---------- photo collage upload ---------- */
const collageInput = document.getElementById('collage-input');
const collageSlots = document.querySelectorAll('#collage-grid .collage-slot');
collageInput.addEventListener('change', (e)=>{
  const files = Array.from(e.target.files).slice(0, collageSlots.length);
  files.forEach((file, i)=>{
    const reader = new FileReader();
    reader.onload = ()=>{
      collageSlots[i].innerHTML = '';
      const img = document.createElement('img');
      img.src = reader.result; img.alt = '';
      collageSlots[i].appendChild(img);
    };
    reader.readAsDataURL(file);
  });
});

/* ---------- global reset button ---------- */
document.getElementById('reset-toggle').addEventListener('click', ()=>{
  resetHero();
  resetCake();
  goTo(0);
  window.scrollTo({ top:0, behavior:'smooth' });
  setTimeout(playHero, 700);
});
</script>

</body>
</html>
